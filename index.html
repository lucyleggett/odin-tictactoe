<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-tac-toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com" type="module"></script>
</head>
<body>
    <div class="container">
        <section class="game-initializer">
            <h1>Tic-tac-toe</h1>
            <form class="name-one" method="get">
                <div class="floater">
                    <p class="token token-x">X</p>
                    <label for="player-one">Player One</label>
                    <div class="icon-picker">
                        <button class="icon p1" id="alien"><img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Microsoft-Teams-Animated-Emojis/master/Emojis/Smilies/Alien.png" alt="Green alien emoji" /></button>
                        <button class="icon p1" id="cowboy"><img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Microsoft-Teams-Animated-Emojis/master/Emojis/Smilies/Cowboy%20Hat%20Face.png" alt="Yellow smiling emoji wearing a cowboy hat"/></button>
                        <button class="icon p1" id="dolphin"><img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Microsoft-Teams-Animated-Emojis/master/Emojis/Animals/Dolphin.png" alt="Blue dolphin spinning round" /></button>
                        <button class="icon p1" id="ghost"><img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Microsoft-Teams-Animated-Emojis/master/Emojis/Smilies/Ghost.png" alt="White ghost emoji winking with its tongue out" /></button>
                        <button class="icon p1" id="devil"><img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Microsoft-Teams-Animated-Emojis/master/Emojis/Smilies/Smiling%20Face%20with%20Horns.png" alt="Purple smiling devil emoji"></button>
                    </div>
                    <input id="player-one" type="text" name="player-one" autofocus maxlength="12">
                </div>
                <button class="action next">Next</button>
            </form>
            <form class="disabled name-two" action="" method="get">
                <div class="floater">
                    <p class="token token-o">O</p>
                    <label for="player-two">Player Two</label>
                    <div class="icon-picker">
                        <button class="icon p2" id="alien"><img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Microsoft-Teams-Animated-Emojis/master/Emojis/Smilies/Alien.png" alt="Green alien emoji" /></button>
                        <button class="icon p2" id="cowboy"><img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Microsoft-Teams-Animated-Emojis/master/Emojis/Smilies/Cowboy%20Hat%20Face.png" alt="Yellow smiling emoji wearing a cowboy hat"/></button>
                        <button class="icon p2" id="dolphin"><img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Microsoft-Teams-Animated-Emojis/master/Emojis/Animals/Dolphin.png" alt="Blue dolphin spinning round" /></button>
                        <button class="icon p2" id="ghost"><img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Microsoft-Teams-Animated-Emojis/master/Emojis/Smilies/Ghost.png" alt="White ghost emoji winking with its tongue out" /></button>
                        <button class="icon p2" id="devil"><img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Microsoft-Teams-Animated-Emojis/master/Emojis/Smilies/Smiling%20Face%20with%20Horns.png" alt="Purple smiling devil emoji"></button>
                    </div>
                    <input id="player-two" type="text" name="player-two" maxlength="12">
                </div>
                <button class="action ready">Start game</button>
            </form>
        </section>
        <main class="disabled">
            <div class="scoreboard">
                <div class="p1">
                    <div class="icon-p1"></div>
                    <p class="name"></p><p class="score"></p>
                </div>
                <div class="p2">
                    <div class="icon-p2"></div>
                    <p class="name"></p><p class="score"></p>
                </div>
            </div>
            <div class="board"></div>
        </main>
        <div class="blur-overlay disabled"></div>
        <section class="results-conveyor disabled">
            <div class="results-message"></div>
            <button class="action anotherBtn">Next game</button>
            <button class="action resultsBtn">Final results</button>
        </section>
    </div>
        <section class="final-results disabled">
        <div class="confetti-layer"></div>
        <div class="results-layer">
            <div class="drumroll"></div>
            <div class="victor"></div>
            <div class="winner-icon"></div>
        </div>
    </section>
</body>
</html>
