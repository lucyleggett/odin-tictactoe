<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-tac-toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <section class="game-initializer">
            <h1>Tic-tac-toe</h1>
            <form class="name-one" method="get">
                <div class="floater">
                    <p class="token">X</p>
                    <label for="player-one">Player One</label>
                    <input id="player-one" type="text" name="player-one">
                </div>
                <button class="next">Next</button>
            </form>
            <form class="disabled name-two" action="" method="get">
                <div class="floater">
                    <p class="token">O</p>
                    <label for="player-two">Player Two</label>
                    <input id="player-two" type="text" name="player-two">
                </div>
                <button class="ready">Start game</button>
            </form>
        </section>
        <main class="disabled">
            <h1>Tic-tac-toe</h1>
            <div class="main-message"></div>
            <div class="board"></div>
        </main>
        <section class="results-conveyor" class="disabled">
            <div class="results-message"></div>
        </section>
    </div>
</body>
</html>
